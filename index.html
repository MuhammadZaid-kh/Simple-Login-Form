<!DOCTYPE html>
<html>
    <head>
        <style>
            body{font-family: sans-serif }
.auth-form{
    width: 30%;
    margin: auto;
    padding: 50px;
    border-radius: 5px;
    margin-top: 50px;
    box-shadow: 0px 0px 1px 0px;
    display: flex; 
    flex-direction: column;
    gap: 10px;
    }
    input{
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
    }
    button{
        background: #000;
        color: #fff;
        border: none;
        padding: 12px;
        cursor: pointer;
    }
    a{
        font-size: 11px;
        text-align: center;
        color: #666;
    }
        </style>
    </head>
    <body>
        <form class="auth-form" action="#">
            <h3>Welcome Back</h3>
            <input type="email" placeholder="Email Address">
            <input type="password" placeholder="Password">
            <button type="submit">Login</button>
            <a href="#">Forgot Password?</a>
        </form>
    </body>
</html>
